<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shrinking Notepad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --sidebar-bg: #f3f4f6;
            --accent: #3b82f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e5e7eb;
                --sidebar-bg: #1f2937;
                --accent: #60a5fa;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #editor {
            background: transparent;
            color: var(--text-color);
            border: none;
            outline: none;
            resize: none;
            width: 100%;
            height: 100%;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
            transition: font-size 0.1s ease-out;
        }

        .sidebar {
            background-color: var(--sidebar-bg);
            transition: transform 0.3s ease-in-out;
            z-index: 50;
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        .history-item {
            cursor: pointer;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .history-item:hover {
            background-color: rgba(128, 128, 128, 0.1);
        }

        .history-item.active {
            border-left: 4px solid var(--accent);
            background-color: rgba(59, 130, 246, 0.1);
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed inset-y-0 left-0 w-64 md:w-80 p-4 border-r border-gray-700/10 flex flex-col closed">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold text-xl">History</h2>
            <button onclick="toggleSidebar()" class="p-2 rounded-full hover:bg-gray-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>
        
        <button onclick="newNote()" class="mb-4 w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
            + New Note
        </button>

        <div id="historyList" class="flex-1 overflow-y-auto no-scrollbar">
            <!-- History items injected here -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="relative flex-1 flex flex-col h-full w-full">
        <!-- Overlay for mobile sidebar -->
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 hidden z-40"></div>

        <!-- Controls -->
        <div class="absolute top-4 left-4 z-10 flex gap-2">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg bg-gray-500/10 hover:bg-gray-500/20 backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>

        <div class="flex-1 flex items-center justify-center overflow-hidden p-4 md:p-12">
            <textarea 
                id="editor" 
                placeholder="Start typing..." 
                spellcheck="false"
                autocomplete="off"
            ></textarea>
        </div>
    </main>

    <script>
        const editor = document.getElementById('editor');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const historyList = document.getElementById('historyList');
        
        let currentNoteId = null;
        let notes = JSON.parse(localStorage.getItem('shrink_notes') || '[]');

        // Initialize
        window.onload = () => {
            loadLatestNote();
            editor.focus();
            updateHistoryUI();
            adjustFontSize();
        };

        // Resize observer to handle font resizing when window size changes
        const resizeObserver = new ResizeObserver(() => {
            adjustFontSize();
        });
        resizeObserver.observe(editor);

        editor.addEventListener('input', () => {
            adjustFontSize();
            saveCurrentNote();
        });

        function adjustFontSize() {
            const text = editor.value;
            const containerWidth = editor.clientWidth - 40;
            const containerHeight = editor.clientHeight - 40;
            
            // Start large, shrink down
            let fontSize = 120; // Max size
            const minSize = 16;  // Min size
            
            // Create a hidden span to measure text size accurately
            const tester = document.createElement('span');
            tester.style.visibility = 'hidden';
            tester.style.position = 'absolute';
            tester.style.whiteSpace = 'pre-wrap';
            tester.style.lineHeight = '1.2';
            tester.style.width = containerWidth + 'px';
            tester.innerText = text || editor.placeholder;
            document.body.appendChild(tester);

            while (fontSize > minSize) {
                tester.style.fontSize = fontSize + 'px';
                if (tester.offsetHeight <= containerHeight) {
                    break;
                }
                fontSize -= 2;
            }

            document.body.removeChild(tester);
            editor.style.fontSize = fontSize + 'px';
        }

        function saveCurrentNote() {
            const content = editor.value.trim();
            if (!content) return;

            const timestamp = new Date().getTime();
            
            if (!currentNoteId) {
                currentNoteId = 'note_' + timestamp;
                notes.unshift({
                    id: currentNoteId,
                    text: content,
                    updated: timestamp
                });
            } else {
                const index = notes.findIndex(n => n.id === currentNoteId);
                if (index !== -1) {
                    notes[index].text = content;
                    notes[index].updated = timestamp;
                    // Move to top
                    const note = notes.splice(index, 1)[0];
                    notes.unshift(note);
                }
            }

            // Limit history to 50 items
            if (notes.length > 50) notes.pop();
            
            localStorage.setItem('shrink_notes', JSON.stringify(notes));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            historyList.innerHTML = '';
            notes.forEach(note => {
                const item = document.createElement('div');
                item.className = `history-item ${note.id === currentNoteId ? 'active' : ''}`;
                item.innerText = note.text.substring(0, 50) || "(Empty Note)";
                item.onclick = () => loadNote(note.id);
                historyList.appendChild(item);
            });
        }

        function loadNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                currentNoteId = note.id;
                editor.value = note.text;
                adjustFontSize();
                updateHistoryUI();
                if (window.innerWidth < 768) toggleSidebar();
            }
        }

        function loadLatestNote() {
            if (notes.length > 0) {
                loadNote(notes[0].id);
            } else {
                newNote();
            }
        }

        function newNote() {
            currentNoteId = null;
            editor.value = '';
            adjustFontSize();
            updateHistoryUI();
            editor.focus();
            if (window.innerWidth < 768 && !sidebar.classList.contains('closed')) toggleSidebar();
        }

        function toggleSidebar() {
            sidebar.classList.toggle('closed');
            overlay.classList.toggle('hidden');
        }

        // Prevent tab from leaving textarea
        editor.onkeydown = function(e) {
            if (e.keyCode === 9) {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "\t" + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 1;
            }
        };
    </script>
</body>
</html>
