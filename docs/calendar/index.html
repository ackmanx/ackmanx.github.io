<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Full Page Calendar</title>

  <!-- Load Tailwind CSS via CDN for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configure Tailwind to use class-based dark mode
    tailwind.config = { darkMode: 'class' }

    // Prevent Flash of Unstyled Content (FOUC)
    if (
      localStorage.theme === 'dark' ||
      (!('theme' in localStorage) &&
        window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>

  <!-- Load Phosphor Icons for high-quality SVG icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Custom CSS for specific overrides like scrollbar hiding -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    /* Hide scrollbar for cleanly styled lists but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    /* Soft fade-in animation for modals */
    .fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body
  class="h-[100dvh] w-screen overflow-hidden flex flex-col text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
  <!-- Application Header -->
  <header
    class="flex-none bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-4 md:px-6 py-3 md:py-4 flex items-center justify-between shadow-sm z-10 transition-colors duration-200">
    <div class="flex items-center gap-2 md:gap-4 flex-1 min-w-0">
      <!-- Navigation Controls -->
      <div class="flex items-center gap-1 md:gap-2 pr-2 md:pr-4 border-r border-slate-200 dark:border-slate-700">
        <button id="btn-prev-month"
          class="p-1 md:p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300">
          <i class="ph ph-caret-left text-lg"></i>
        </button>
        <h2 id="current-month-display" class="text-sm md:text-lg font-semibold w-24 md:w-36 text-center select-none dark:text-slate-100 truncate">
          Month Year
        </h2>
        <button id="btn-next-month"
          class="p-1 md:p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300">
          <i class="ph ph-caret-right text-lg"></i>
        </button>
      </div>

      <!-- Desktop Calendar Chips -->
      <div id="calendar-chips" class="hidden md:flex items-center gap-2 overflow-x-auto no-scrollbar flex-1 pb-1">
        <!-- Chips will be dynamically inserted here -->
      </div>

      <!-- Mobile Calendar Dropdown -->
      <div class="flex md:hidden items-center gap-2 flex-1 min-w-0">
        <div class="relative flex-1 min-w-0">
          <select id="mobile-cal-select"
            class="w-full px-3 py-1.5 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white rounded-lg appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer text-sm font-medium truncate pr-8">
            <!-- Options dynamically inserted -->
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500 dark:text-slate-400">
            <i class="ph ph-caret-down"></i>
          </div>
        </div>
        <button id="btn-edit-mobile-cal"
          class="flex-none p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-500 dark:text-slate-400"
          title="Edit active calendar">
          <i class="ph ph-pencil-simple text-lg"></i>
        </button>
      </div>
    </div>

    <div class="flex items-center gap-2 ml-2 md:ml-4">
      <!-- Add Calendar Button -->
      <button id="btn-new-calendar"
        class="flex-none bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-500/30 p-2 rounded-full transition-colors flex items-center justify-center group"
        title="Create new calendar">
        <i class="ph ph-plus text-xl group-hover:scale-110 transition-transform"></i>
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 w-full h-full p-4 overflow-auto flex flex-col box-border">
    <div class="min-w-[700px] lg:min-w-0 flex flex-col flex-1 min-h-full pb-4">
      <!-- Days of the Week Header -->
      <div class="grid grid-cols-7 gap-2 mb-2 flex-none">
        <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider py-1">
          Sun
        </div>
        <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider py-1">
          Mon
        </div>
        <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider py-1">
          Tue
        </div>
        <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider py-1">
          Wed
        </div>
        <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider py-1">
          Thu
        </div>
        <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider py-1">
          Fri
        </div>
        <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider py-1">
          Sat
        </div>
      </div>

      <!-- Dynamic Calendar Grid (fills remaining space) -->
      <div id="calendar-grid" class="flex-1 grid grid-cols-7 gap-2 min-h-0">
        <!-- Days will be dynamically inserted here -->
      </div>
    </div>
  </main>

  <!-- Entry Modal (Hidden by default) -->
  <div id="entry-modal"
    class="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
      class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-md overflow-hidden fade-in flex flex-col max-h-full border border-slate-200 dark:border-slate-700">
      <div
        class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
        <div class="flex items-center gap-3">
          <h3 id="modal-title" class="text-lg font-semibold text-slate-800 dark:text-slate-100">
            Add Entry
          </h3>
          <label class="inline-flex items-center cursor-pointer ml-2 hidden" id="edit-mode-toggle-container">
            <input type="checkbox" id="edit-mode-toggle" class="sr-only peer">
            <div class="relative w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-slate-600 peer-checked:bg-indigo-600"></div>
            <span class="ms-2 text-xs font-medium text-slate-600 dark:text-slate-300">Edit</span>
          </label>
        </div>
        <button id="btn-close-modal"
          class="text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors p-1">
          <i class="ph ph-x text-xl"></i>
        </button>
      </div>

      <div class="p-6 overflow-y-auto space-y-5">
        <!-- Selected Date Display -->
        <div
          class="bg-indigo-50 dark:bg-indigo-500/10 text-indigo-800 dark:text-indigo-300 text-sm py-2 px-3 rounded-lg flex items-center gap-2 font-medium border border-indigo-100 dark:border-indigo-500/20">
          <i class="ph ph-calendar-blank"></i>
          <span id="modal-date-display">Date</span>
        </div>

        <div>
          <label for="entry-name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name</label>
          <input type="text" id="entry-name"
            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400 dark:placeholder-slate-500"
            placeholder="E.g., Team Meeting" autocomplete="off" />
        </div>

        <div>
          <label for="entry-desc"
            class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
          <textarea id="entry-desc" rows="3"
            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none placeholder-slate-400 dark:placeholder-slate-500"
            placeholder="Optional details..."></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Color</label>
          <div class="flex flex-wrap items-center gap-3" id="entry-color-picker">
            <button type="button" data-color="indigo" class="w-6 h-6 rounded-full bg-indigo-500 ring-2 ring-offset-2 ring-offset-white dark:ring-offset-slate-800 ring-indigo-500 transition-all focus:outline-none"></button>
            <button type="button" data-color="red" class="w-6 h-6 rounded-full bg-red-500 ring-2 ring-offset-2 ring-offset-white dark:ring-offset-slate-800 ring-transparent transition-all focus:outline-none"></button>
            <button type="button" data-color="emerald" class="w-6 h-6 rounded-full bg-emerald-500 ring-2 ring-offset-2 ring-offset-white dark:ring-offset-slate-800 ring-transparent transition-all focus:outline-none"></button>
            <button type="button" data-color="amber" class="w-6 h-6 rounded-full bg-amber-500 ring-2 ring-offset-2 ring-offset-white dark:ring-offset-slate-800 ring-transparent transition-all focus:outline-none"></button>
            <button type="button" data-color="purple" class="w-6 h-6 rounded-full bg-purple-500 ring-2 ring-offset-2 ring-offset-white dark:ring-offset-slate-800 ring-transparent transition-all focus:outline-none"></button>
            <button type="button" data-color="pink" class="w-6 h-6 rounded-full bg-pink-500 ring-2 ring-offset-2 ring-offset-white dark:ring-offset-slate-800 ring-transparent transition-all focus:outline-none"></button>
          </div>
        </div>

        <div>
          <label for="entry-cadence"
            class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Cadence</label>
          <div class="relative">
            <select id="entry-cadence"
              class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white rounded-lg appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer">
              <option value="Once">Once</option>
              <option value="Daily">Daily</option>
              <option value="Weekly">Weekly</option>
              <option value="Monthly">Monthly</option>
            </select>
            <div
              class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500 dark:text-slate-400">
              <i class="ph ph-caret-down"></i>
            </div>
          </div>
        </div>
      </div>

      <div
        class="px-6 py-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
        <div>
          <button id="btn-delete-entry"
            class="hidden px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-500/10 rounded-lg transition-colors">
            Delete
          </button>
        </div>
        <div class="flex gap-3">
          <button id="btn-cancel-entry"
            class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">
            Cancel
          </button>
          <button id="btn-save-entry"
            class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Save Entry
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- New Calendar Modal -->
  <div id="new-cal-modal"
    class="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
      class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-sm overflow-hidden fade-in border border-slate-200 dark:border-slate-700">
      <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
        <h3 id="cal-modal-title" class="text-lg font-semibold text-slate-800 dark:text-slate-100">
          Create New Calendar
        </h3>
      </div>
      <div class="p-6">
        <label for="cal-name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Calendar
          Name</label>
        <input type="text" id="cal-name"
          class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400 dark:placeholder-slate-500"
          placeholder="E.g., Work, Personal, Fitness" autocomplete="off" />
      </div>
      <div
        class="px-6 py-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
        <div>
          <button id="btn-delete-cal-direct"
            class="hidden px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-500/10 rounded-lg transition-colors">
            Delete
          </button>
        </div>
        <div class="flex gap-3">
          <button id="btn-cancel-cal"
            class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">
            Cancel
          </button>
          <button id="btn-save-cal"
            class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition-colors">
            Create
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Calendar Confirmation Modal -->
  <div id="delete-cal-modal"
    class="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
      class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-sm overflow-hidden fade-in border border-slate-200 dark:border-slate-700">
      <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100">
          Delete Calendar
        </h3>
      </div>
      <div class="p-6">
        <p class="text-sm text-slate-700 dark:text-slate-300">
          Are you sure you want to delete the calendar
          <span id="delete-cal-name" class="font-bold text-slate-900 dark:text-white"></span>? All of its entries will
          be permanently deleted. This action cannot be
          undone.
        </p>
      </div>
      <div
        class="px-6 py-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
        <button id="btn-cancel-delete-cal"
          class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">
          Cancel
        </button>
        <button id="btn-confirm-delete-cal"
          class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors">
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[60] flex flex-col gap-2 pointer-events-none"></div>

  <script>
    // --- Application State ---
    let appData = {
      calendars: [],
      entries: [],
      activeCalId: null,
    }

    let currentDate = new Date()
    let selectedDateForEntry = null

    // --- Utility Functions ---
    const generateUUID = () => {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
        var r = (Math.random() * 16) | 0,
          v = c == 'x' ? r : (r & 0x3) | 0x8
        return v.toString(16)
      })
    }

    const loadData = async () => {
      const stored = localStorage.getItem('calendarAppData')
      if (stored) {
        appData = JSON.parse(stored)
      }

      try {
        const response = await fetch('https://friends-of-mongo.vercel.app/calendar')
        if (response.ok) {
          const data = await response.json()
          if (data && data.appData) {
            appData = data.appData
          }
        }
      } catch (error) {
        console.error('Failed to fetch calendar data', error)
      }

      // Auto-create default calendar if none exists
      if (appData.calendars.length === 0) {
        const defaultCalId = generateUUID()
        appData.calendars.push({ id: defaultCalId, name: 'My Calendar' })
        appData.activeCalId = defaultCalId
        saveData()
      } else if (!appData.activeCalId) {
        appData.activeCalId = appData.calendars[0].id
        saveData()
      }
    }

    const saveData = async () => {
      localStorage.setItem('calendarAppData', JSON.stringify(appData))

      try {
        const password = localStorage.getItem('super_secret')
        const response = await fetch('https://friends-of-mongo.vercel.app/calendar', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            password,
            appData,
          }),
        })
        
        const data = await response.json().catch(() => null)
        
        if (data && data.message) {
          showToast(data.message, 'error')
        } else if (!response.ok) {
          showToast(`Server error: ${response.status}`, 'error')
        }
      } catch (error) {
        console.error('Failed to save calendar data to mongo', error)
        showToast('Network error while saving data', 'error')
      }
    }

    const formatDateStr = (year, month, day) => {
      return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`
    }

    const parseDateStr = (dateStr) => {
      const [y, m, d] = dateStr.split('-')
      return new Date(parseInt(y), parseInt(m) - 1, parseInt(d))
    }

    // --- Toast Notifications ---
    const showToast = (message, type = 'error') => {
      const container = document.getElementById('toast-container')
      if (!container) return

      const toast = document.createElement('div')
      
      const baseClasses = 'px-4 py-3 rounded-lg shadow-lg text-sm font-medium transform transition-all duration-300 translate-y-4 opacity-0 flex items-center gap-2 pointer-events-auto'
      
      let typeClasses = ''
      let icon = ''
      if (type === 'error') {
        typeClasses = 'bg-red-500 text-white dark:bg-red-600'
        icon = '<i class="ph ph-warning-circle text-lg"></i>'
      } else {
        typeClasses = 'bg-emerald-500 text-white dark:bg-emerald-600'
        icon = '<i class="ph ph-check-circle text-lg"></i>'
      }
      
      toast.className = `${baseClasses} ${typeClasses}`
      toast.innerHTML = `${icon} <span>${message}</span>`
      
      container.appendChild(toast)
      
      // Animate in
      requestAnimationFrame(() => {
        toast.classList.remove('translate-y-4', 'opacity-0')
        toast.classList.add('translate-y-0', 'opacity-100')
      })
      
      // Remove after 3 seconds
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100')
        toast.classList.add('opacity-0', 'translate-y-[-1rem]')
        setTimeout(() => toast.remove(), 300)
      }, 3000)
    }

    // --- STREAMING_CHUNK:Implementing calendar rendering logic... ---

    // Render Header Chips
    const renderChips = () => {
      const container = document.getElementById('calendar-chips')
      container.innerHTML = ''
      const mobileSelect = document.getElementById('mobile-cal-select')
      if (mobileSelect) mobileSelect.innerHTML = ''

      appData.calendars.forEach((cal) => {
        const isActive = cal.id === appData.activeCalId

        const chip = document.createElement('div')
        chip.className = `group flex items-center flex-none pl-4 pr-1 py-1 rounded-full text-sm font-medium transition-all duration-200 border cursor-pointer select-none ${isActive
          ? 'bg-indigo-600 dark:bg-indigo-500 text-white border-indigo-600 dark:border-indigo-500 shadow-md shadow-indigo-200 dark:shadow-none'
          : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700'
          }`

        const nameSpan = document.createElement('span')
        nameSpan.className = 'pr-2'
        nameSpan.textContent = cal.name
        chip.appendChild(nameSpan)

        const editBtn = document.createElement('button')
        editBtn.innerHTML = '<i class="ph ph-pencil-simple"></i>'
        editBtn.className = `opacity-0 group-hover:opacity-100 transition-opacity p-1.5 rounded-full flex items-center justify-center ${isActive
          ? 'hover:bg-indigo-700 dark:hover:bg-indigo-600 text-indigo-200 hover:text-white'
          : 'hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-400 hover:text-indigo-500 dark:hover:text-indigo-400'
          }`
        editBtn.title = 'Edit Calendar'

        editBtn.addEventListener('click', (e) => {
          e.stopPropagation() // Prevents the chip from becoming 'active' when trying to edit it
          openCalModal(cal.id, cal.name)
        })

        chip.appendChild(editBtn)

        chip.addEventListener('click', () => {
          appData.activeCalId = cal.id
          saveData()
          renderChips()
          renderCalendar()
        })

        container.appendChild(chip)

        // Populate mobile dropdown
        if (mobileSelect) {
          const option = document.createElement('option')
          option.value = cal.id
          option.textContent = cal.name
          option.selected = isActive
          mobileSelect.appendChild(option)
        }
      })
    }

    // Date Recurrence Logic
    const isEntryOnDate = (entry, checkDateObj) => {
      if (entry.calendarId !== appData.activeCalId) return false

      const entryStartObj = parseDateStr(entry.date)

      // Ignore times, focus strictly on dates
      entryStartObj.setHours(0, 0, 0, 0)
      const checkTime = checkDateObj.getTime()
      const startTime = entryStartObj.getTime()

      // Event hasn't started yet
      if (checkTime < startTime) return false

      // Exact same day
      if (checkTime === startTime) return true

      // Handle cadences
      if (entry.cadence === 'Daily') return true

      if (entry.cadence === 'Weekly') {
        const diffTime = Math.abs(checkTime - startTime)
        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24))
        return diffDays % 7 === 0
      }

      if (entry.cadence === 'Monthly') {
        // Occurs on the same day of the month
        // Note: Edge cases like 31st skipped on months with 30 days are natively handled
        // by the fact they just won't match standard Date days unless we write complex logic.
        // Keeping it straightforward per requirements.
        return checkDateObj.getDate() === entryStartObj.getDate()
      }

      return false // 'Once' or unknown cadence
    }

    // --- STREAMING_CHUNK:Rendering the interactive calendar grid... ---

    const renderCalendar = () => {
      const year = currentDate.getFullYear()
      const month = currentDate.getMonth()

      // Update Header Display
      const monthNames = [
        'January',
        'February',
        'March',
        'April',
        'May',
        'June',
        'July',
        'August',
        'September',
        'October',
        'November',
        'December',
      ]
      document.getElementById('current-month-display').textContent =
        `${monthNames[month]} ${year}`

      const grid = document.getElementById('calendar-grid')
      grid.innerHTML = ''

      // Calculate grid dates
      const firstDayOfMonth = new Date(year, month, 1).getDay() // 0 (Sun) to 6 (Sat)
      const daysInMonth = new Date(year, month + 1, 0).getDate()

      // Calculate how many rows we need (5 or 6 typically) to fit the days
      const totalCells = Math.ceil((firstDayOfMonth + daysInMonth) / 7) * 7

      // Set dynamic grid rows
      grid.style.gridTemplateRows = `repeat(${totalCells / 7}, minmax(100px, 1fr))`

      const today = new Date()
      today.setHours(0, 0, 0, 0)

      // Fetch entries for active calendar to optimize loop
      const activeEntries = appData.entries.filter(
        (e) => e.calendarId === appData.activeCalId
      )

      for (let i = 0; i < totalCells; i++) {
        // Compute Date for cell (handles previous/next month overlap seamlessly)
        const cellDateObj = new Date(year, month, i - firstDayOfMonth + 1)
        cellDateObj.setHours(0, 0, 0, 0)

        const dateStr = formatDateStr(
          cellDateObj.getFullYear(),
          cellDateObj.getMonth(),
          cellDateObj.getDate()
        )
        const isCurrentMonth = cellDateObj.getMonth() === month
        const isToday = cellDateObj.getTime() === today.getTime()

        // Build Cell Container
        const cell = document.createElement('div')
        cell.className = `border rounded-lg p-2 flex flex-col transition-all duration-300 cursor-pointer group ${isCurrentMonth
          ? 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:shadow-md'
          : 'bg-transparent border-transparent opacity-30 grayscale hover:grayscale-0 hover:opacity-100 hover:bg-white dark:hover:bg-slate-800 hover:border-slate-200 dark:hover:border-slate-700 hover:shadow-sm'
          } ${isToday ? 'ring-2 ring-indigo-500 dark:ring-indigo-400 border-transparent' : ''}`

        // Add click listener for modal
        cell.addEventListener('click', () => openEntryModal(dateStr, cellDateObj))

        // Date Number Header
        const dateHeader = document.createElement('div')
        dateHeader.className = `text-right mb-1 ${isCurrentMonth
          ? 'text-slate-700 dark:text-slate-200'
          : 'text-slate-400 dark:text-slate-500'
          }`

        const dateSpan = document.createElement('span')
        dateSpan.className = `inline-flex items-center justify-center w-7 h-7 text-sm font-semibold rounded-full ${isToday
          ? 'bg-indigo-600 dark:bg-indigo-500 text-white'
          : 'group-hover:bg-slate-100 dark:group-hover:bg-slate-700'
          }`
        dateSpan.textContent = cellDateObj.getDate()

        dateHeader.appendChild(dateSpan)
        cell.appendChild(dateHeader)

        // Entries Container
        const entriesContainer = document.createElement('div')
        entriesContainer.className = 'flex-1 overflow-y-auto no-scrollbar space-y-1'

        // Find matching entries for this date
        const todaysEntries = activeEntries.filter((entry) =>
          isEntryOnDate(entry, cellDateObj)
        )

        todaysEntries.forEach((entry) => {
          const entryEl = document.createElement('div')
          const color = entry.color || 'indigo'
          entryEl.className =
            `bg-${color}-50 dark:bg-${color}-500/10 border border-${color}-100 dark:border-${color}-500/20 text-${color}-800 dark:text-${color}-300 text-xs px-2 py-1.5 rounded truncate font-medium flex items-center group/item hover:bg-${color}-100 dark:hover:bg-${color}-500/20 transition-colors`

          const titleSpan = document.createElement('span')
          titleSpan.textContent = entry.name
          titleSpan.className = 'truncate pointer-events-none'
          entryEl.appendChild(titleSpan)

          entryEl.addEventListener('click', (e) => {
            e.stopPropagation() // Don't trigger cell click
            openEntryModal(entry.date, parseDateStr(entry.date), entry)
          })

          entriesContainer.appendChild(entryEl)
        })

        cell.appendChild(entriesContainer)
        grid.appendChild(cell)
      }
    }

    // --- STREAMING_CHUNK:Setting up Event Listeners and Modals... ---

    // Month Navigation
    document.getElementById('btn-prev-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1)
      renderCalendar()
    })

    document.getElementById('btn-next-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1)
      renderCalendar()
    })

    // Entry Modal Logic
    let currentEditingEntryId = null
    let isEditMode = true

    const entryModal = document.getElementById('entry-modal')
    const entryNameInput = document.getElementById('entry-name')
    const entryDescInput = document.getElementById('entry-desc')
    const entryCadenceSelect = document.getElementById('entry-cadence')
    const editModeToggleContainer = document.getElementById('edit-mode-toggle-container')
    const editModeToggle = document.getElementById('edit-mode-toggle')
    const btnSaveEntry = document.getElementById('btn-save-entry')
    const btnDeleteEntry = document.getElementById('btn-delete-entry')
    const modalTitle = document.getElementById('modal-title')

    let selectedEntryColor = 'indigo'
    const colorButtons = document.querySelectorAll('#entry-color-picker button')
    
    colorButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (!isEditMode) return
        
        colorButtons.forEach(b => {
          b.classList.remove(`ring-${b.dataset.color}-500`)
          b.classList.add('ring-transparent')
        })
        
        const clickedBtn = e.currentTarget
        const color = clickedBtn.dataset.color
        clickedBtn.classList.remove('ring-transparent')
        clickedBtn.classList.add(`ring-${color}-500`)
        
        selectedEntryColor = color
      })
    })

    const updateColorPickerUI = (color) => {
      selectedEntryColor = color || 'indigo'
      colorButtons.forEach(b => {
        if (b.dataset.color === selectedEntryColor) {
          b.classList.remove('ring-transparent')
          b.classList.add(`ring-${b.dataset.color}-500`)
        } else {
          b.classList.remove(`ring-${b.dataset.color}-500`)
          b.classList.add('ring-transparent')
        }
      })
    }

    const setEditMode = (mode) => {
      isEditMode = mode
      editModeToggle.checked = mode
      entryNameInput.disabled = !mode
      entryDescInput.disabled = !mode
      entryCadenceSelect.disabled = !mode
      btnSaveEntry.disabled = !mode

      colorButtons.forEach(btn => {
        btn.disabled = !mode
        if (!mode) {
          btn.classList.add('cursor-not-allowed', 'opacity-50')
        } else {
          btn.classList.remove('cursor-not-allowed', 'opacity-50')
        }
      })

      if (!mode) {
        btnDeleteEntry.classList.add('hidden')
      } else if (currentEditingEntryId) {
        btnDeleteEntry.classList.remove('hidden')
      }
    }

    editModeToggle.addEventListener('change', (e) => {
      setEditMode(e.target.checked)
    })

    const handleEntryEnter = (e) => {
      if (e.key === 'Enter' && isEditMode) {
        e.preventDefault()
        document.getElementById('btn-save-entry').click()
      }
    }
    entryNameInput.addEventListener('keydown', handleEntryEnter)
    entryCadenceSelect.addEventListener('keydown', handleEntryEnter)

    const openEntryModal = (dateStr, dateObj, entry = null) => {
      selectedDateForEntry = dateStr
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
      }
      document.getElementById('modal-date-display').textContent =
        dateObj.toLocaleDateString(undefined, options)

      if (entry) {
        // View existing entry
        currentEditingEntryId = entry.id
        modalTitle.textContent = 'View Entry'
        editModeToggleContainer.classList.remove('hidden')
        
        entryNameInput.value = entry.name
        entryDescInput.value = entry.description || ''
        entryCadenceSelect.value = entry.cadence || 'Once'
        updateColorPickerUI(entry.color)
        
        setEditMode(false)
      } else {
        // Add new entry
        currentEditingEntryId = null
        modalTitle.textContent = 'Add Entry'
        editModeToggleContainer.classList.add('hidden')
        
        entryNameInput.value = ''
        entryDescInput.value = ''
        entryCadenceSelect.value = 'Monthly'
        updateColorPickerUI('indigo')
        
        setEditMode(true)
      }

      entryModal.classList.remove('hidden')
      if (isEditMode) {
        setTimeout(() => entryNameInput.focus(), 50)
      }
    }

    const closeEntryModal = () => {
      entryModal.classList.add('hidden')
      selectedDateForEntry = null
      currentEditingEntryId = null
    }

    document
      .getElementById('btn-close-modal')
      .addEventListener('click', closeEntryModal)
    document
      .getElementById('btn-cancel-entry')
      .addEventListener('click', closeEntryModal)

    document.getElementById('btn-save-entry').addEventListener('click', () => {
      if (!isEditMode) return
      const name = entryNameInput.value.trim()
      if (!name) return

      if (currentEditingEntryId) {
        // Update existing
        const entry = appData.entries.find(e => e.id === currentEditingEntryId)
        if (entry) {
          entry.name = name
          entry.description = entryDescInput.value.trim()
          entry.cadence = entryCadenceSelect.value
          entry.color = selectedEntryColor
        }
      } else {
        // Create new
        const newEntry = {
          id: generateUUID(),
          calendarId: appData.activeCalId,
          date: selectedDateForEntry,
          name: name,
          description: entryDescInput.value.trim(),
          cadence: entryCadenceSelect.value,
          color: selectedEntryColor,
        }
        appData.entries.push(newEntry)
      }

      saveData()
      renderCalendar()
      closeEntryModal()
    })

    document.getElementById('btn-delete-entry').addEventListener('click', () => {
      if (currentEditingEntryId) {
        deleteEntry(currentEditingEntryId)
        closeEntryModal()
      }
    })

    const deleteEntry = (id) => {
      appData.entries = appData.entries.filter((e) => e.id !== id)
      saveData()
      renderCalendar()
    }

    // Edit/New Calendar Modal Logic
    const newCalModal = document.getElementById('new-cal-modal')
    const calNameInput = document.getElementById('cal-name')
    const calModalTitle = document.getElementById('cal-modal-title')
    const btnSaveCal = document.getElementById('btn-save-cal')
    const btnDeleteCalDirect = document.getElementById('btn-delete-cal-direct')
    
    let currentEditingCalId = null

    calNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault()
        document.getElementById('btn-save-cal').click()
      }
    })

    const openCalModal = (calId = null, calName = '') => {
      currentEditingCalId = calId
      calNameInput.value = calName
      
      if (calId) {
        calModalTitle.textContent = 'Edit Calendar'
        btnSaveCal.textContent = 'Save'
        btnDeleteCalDirect.classList.remove('hidden')
      } else {
        calModalTitle.textContent = 'Create New Calendar'
        btnSaveCal.textContent = 'Create'
        btnDeleteCalDirect.classList.add('hidden')
      }
      
      newCalModal.classList.remove('hidden')
      setTimeout(() => calNameInput.focus(), 50)
    }

    const closeCalModal = () => {
      newCalModal.classList.add('hidden')
      currentEditingCalId = null
    }

    document
      .getElementById('btn-new-calendar')
      .addEventListener('click', () => openCalModal())
    document
      .getElementById('btn-cancel-cal')
      .addEventListener('click', closeCalModal)

    btnDeleteCalDirect.addEventListener('click', () => {
      if (currentEditingCalId) {
        const cal = appData.calendars.find(c => c.id === currentEditingCalId)
        if (cal) {
          openDeleteCalModal(cal.id, cal.name)
        }
        closeCalModal()
      }
    })

    btnSaveCal.addEventListener('click', () => {
      const name = calNameInput.value.trim()
      if (!name) return

      if (currentEditingCalId) {
        const cal = appData.calendars.find(c => c.id === currentEditingCalId)
        if (cal) cal.name = name
      } else {
        const newCalId = generateUUID()
        appData.calendars.push({ id: newCalId, name: name })
        appData.activeCalId = newCalId // Auto-switch to new cal
      }

      saveData()
      renderChips()
      renderCalendar()
      closeCalModal()
    })

    // --- STREAMING_CHUNK:Implementing delete calendar logic... ---

    let calendarToDelete = null

    const openDeleteCalModal = (calId, calName) => {
      calendarToDelete = calId
      document.getElementById('delete-cal-name').textContent = `"${calName}"`
      document.getElementById('delete-cal-modal').classList.remove('hidden')
    }

    const closeDeleteCalModal = () => {
      calendarToDelete = null
      document.getElementById('delete-cal-modal').classList.add('hidden')
    }

    document
      .getElementById('btn-cancel-delete-cal')
      .addEventListener('click', closeDeleteCalModal)

    document.getElementById('btn-confirm-delete-cal').addEventListener('click', () => {
      if (!calendarToDelete) return

      // Delete the calendar and all its entries from state
      appData.calendars = appData.calendars.filter((c) => c.id !== calendarToDelete)
      appData.entries = appData.entries.filter((e) => e.calendarId !== calendarToDelete)

      // Re-assign active calendar if the active one was deleted
      if (appData.activeCalId === calendarToDelete) {
        if (appData.calendars.length > 0) {
          appData.activeCalId = appData.calendars[0].id
        } else {
          // Always guarantee at least one default calendar exists
          const defaultCalId = generateUUID()
          appData.calendars.push({ id: defaultCalId, name: 'My Calendar' })
          appData.activeCalId = defaultCalId
        }
      }

      saveData()
      renderChips()
      renderCalendar()
      closeDeleteCalModal()
    })

    // Initialize App
    window.addEventListener('DOMContentLoaded', async () => {
      // Listen for system theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!('theme' in localStorage)) {
          if (e.matches) {
            document.documentElement.classList.add('dark')
          } else {
            document.documentElement.classList.remove('dark')
          }
        }
      })

      const mobileSelect = document.getElementById('mobile-cal-select')
      if (mobileSelect) {
        mobileSelect.addEventListener('change', (e) => {
          appData.activeCalId = e.target.value
          saveData()
          renderChips()
          renderCalendar()
        })
      }

      const mobileEditBtn = document.getElementById('btn-edit-mobile-cal')
      if (mobileEditBtn) {
        mobileEditBtn.addEventListener('click', () => {
          const activeCal = appData.calendars.find(c => c.id === appData.activeCalId)
          if (activeCal) {
            openCalModal(activeCal.id, activeCal.name)
          }
        })
      }

      await loadData()
      renderChips()
      renderCalendar()
    })
  </script>
</body>

</html>
