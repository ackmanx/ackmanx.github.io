<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Every Sunday</title>
    <style>
      body {
        background-color: #fdf6e3;
        color: #586e75;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding-top: 10vh;
      }

      h1 {
        font-size: 5rem;
        margin: 0 0 2rem 0;
      }

      #activity-list {
        width: 100%;
        max-width: 450px;
        margin-bottom: 2rem;
      }

      .activity-item {
        font-size: 1.5rem;
        margin: 0.8rem 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      /* Strikethrough for completed items */
      .activity-text.completed {
        text-decoration: line-through;
        opacity: 0.5;
      }

      .activity-text {
        flex-grow: 1;
        text-align: center;
      }

      /* Delete Button Styling */
      .delete-btn {
        font-size: 1.2rem;
        color: #dc322f; /* Solarized Red */
        margin-left: 1rem;
        opacity: 0.3;
        transition: opacity 0.2s;
        padding: 5px;
      }

      .delete-btn:hover {
        opacity: 1;
      }

      input {
        background: transparent;
        border: none;
        border-bottom: 2px solid #93a1a1;
        color: #586e75;
        font-family: sans-serif;
        font-size: 1.2rem;
        padding: 0.5rem;
        text-align: center;
        outline: none;
      }
    </style>
  </head>
  <body>
    <h1>Sunday</h1>

    <div id="activity-list"></div>

    <input
      type="text"
      id="activity-input"
      placeholder="Add new item..."
      autocomplete="off"
    />
  </body>

  <script src="../every.js"></script>
</html>
